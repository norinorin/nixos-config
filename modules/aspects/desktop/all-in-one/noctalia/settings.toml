[audio]
enable_sounds = true
sound_volume = 1.0

[bar.default]
end = [ "tray", "notifications", "network", "cpu", "ram", "volume", "brightness", "battery", "session" ]
margin_edge = 0.0
margin_ends = 50.0
position = "left"
radius = 0
radius_bottom_right = 20
radius_top_right = 20

[brightness]
enable_ddcutil = true

[idle]
behavior_order = [ "lock", "screen-off", "suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

    [idle.behavior.suspend]
    action = "suspend"
    enabled = false
    lock_before_suspend = true
    timeout = 900

[location]
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@HDMI-A-1",
    "lockscreen-login-box@eDP-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 515.0
    cy = 901.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 209.0
    box_width = 706.0
    cx = 427.0
    cy = 781.5
    output = "HDMI-A-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        clock_style = "digital"
        color = "on_tertiary"
        format = "{:%H:%M:%S}"
        shadow = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 112.0
    box_width = 196.0
    cx = 183.0
    cy = 899.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "weather"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = false
        color = "surface"
        shadow = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000004]
    box_height = 205.0
    box_width = 276.0
    cx = 1752.0
    cy = 133.5
    output = "HDMI-A-1"
    rotation = 0.0
    type = "sysmon"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000005]
    box_height = 206.5
    box_width = 274.0
    cx = 1752.0
    cy = 369.75
    output = "HDMI-A-1"
    rotation = 0.0
    type = "sysmon"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000005.settings]
        stat = "cpu_temp"

[osd]
position = "top_right"

[shell]
niri_overview_type_to_launch_enabled = true
polkit_agent = true
settings_show_advanced = true

[theme]
custom_palette = "stylix"
mode = "light"
source = "custom"

[wallpaper]
directory = "/home/nori/Pictures/WallpapersFiltered"

    [wallpaper.last]
    path = "/home/nori/Pictures/WallpapersFiltered/pixel-galaxy.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/nori/Pictures/WallpapersFiltered/pixel-galaxy.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/nori/Pictures/WallpapersFiltered/cartoon-castle.png"

[weather]
auto_locate = true

[widget.clock]
format = "{:%H:%M}:—:{:%m:%d}"

[widget.cpu]
show_label = false

[widget.media]
hide_when_no_media = true

[widget.network]
show_label = false

[widget.ram]
display = "gauge"
show_label = false

[widget.tray]
capsule = true
drawer = true
pinned = [ "Fcitx", "qBittorrent" ]

[widget.workspaces]
display = "none"
focused_color = "hover"
hide_when_empty = true
occupied_color = "on_surface"